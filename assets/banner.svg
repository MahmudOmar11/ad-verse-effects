<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="360"/><line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/><line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/><line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="700" y1="0" x2="700" y2="360"/><line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="900" y1="0" x2="900" y2="360"/><line x1="1000" y1="0" x2="1000" y2="360"/>
    <line x1="1100" y1="0" x2="1100" y2="360"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="980" cy="70" r="130" fill="none" stroke="#e94560" stroke-width="0.7" opacity="0.1"/>
  <circle cx="1010" cy="90" r="80" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.06"/>
  <circle cx="140" cy="290" r="100" fill="none" stroke="#4a90d9" stroke-width="0.5" opacity="0.06"/>

  <!-- Pill icon (decorative) -->
  <g transform="translate(80, 90) rotate(-30)" opacity="0.12">
    <rect x="0" y="0" width="60" height="24" rx="12" fill="#e94560"/>
    <rect x="30" y="0" width="30" height="24" rx="0" fill="#ff8a8a"/>
  </g>

  <!-- Title -->
  <text x="600" y="100" text-anchor="middle" fill="#ffffff" font-size="54" font-weight="800" letter-spacing="-1">Ad-verse Effects</text>

  <!-- Accent line -->
  <rect x="470" y="116" width="260" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="156" text-anchor="middle" fill="#a0a0c0" font-size="18" font-weight="400">Do Pharmaceutical Ads in LLM Interactions</text>
  <text x="600" y="181" text-anchor="middle" fill="#a0a0c0" font-size="18" font-weight="400">Shift Clinical Recommendations?</text>

  <!-- Stats pills -->
  <g transform="translate(230, 210)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="url(#pill)" stroke="#e94560" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="65" y="23" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="600">12 LLMs</text>
  </g>
  <g transform="translate(380, 210)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="url(#pill)" stroke="#e94560" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="65" y="23" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="600">3 Providers</text>
  </g>
  <g transform="translate(530, 210)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="url(#pill)" stroke="#e94560" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="65" y="23" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="600">33 Scenarios</text>
  </g>
  <g transform="translate(680, 210)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="url(#pill)" stroke="#e94560" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="80" y="23" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="600">256K API Calls</text>
  </g>

  <!-- Author -->
  <text x="600" y="286" text-anchor="middle" fill="#c0c0d8" font-size="14" font-weight="600">Mahmud Omar, MD</text>

  <!-- Affiliations -->
  <text x="600" y="310" text-anchor="middle" fill="#7a7a9a" font-size="11.5">Head of Research, BRIDGE GenAI Lab · BIDMC, Harvard Medical School Teaching Hospital</text>
  <text x="600" y="330" text-anchor="middle" fill="#7a7a9a" font-size="11.5">Research Scientist, Windreich Dept. of AI and Human Health · Mount Sinai Medical Center</text>

</svg>
