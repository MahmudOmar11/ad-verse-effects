<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="exp1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="exp2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3d246c"/>
    </linearGradient>
    <linearGradient id="exp3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#f8f9fa"/>

  <!-- Header -->
  <rect x="20" y="16" width="860" height="54" rx="8" fill="url(#headerGrad)"/>
  <text x="450" y="50" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="0.5">Ad-verse Effects — Experimental Design</text>

  <!-- Left: Input -->
  <rect x="30" y="90" width="180" height="300" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="118" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">INPUT</text>
  <line x1="50" y1="128" x2="190" y2="128" stroke="#dee2e6" stroke-width="1"/>

  <!-- Vignette icon -->
  <rect x="60" y="142" width="120" height="32" rx="6" fill="#e9ecef"/>
  <text x="120" y="163" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">33 Clinical Vignettes</text>

  <rect x="60" y="184" width="120" height="32" rx="6" fill="#e9ecef"/>
  <text x="120" y="205" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">42 Real Ads</text>

  <rect x="60" y="226" width="120" height="32" rx="6" fill="#e9ecef"/>
  <text x="120" y="247" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">4 System Prompts</text>

  <rect x="60" y="268" width="120" height="32" rx="6" fill="#e9ecef"/>
  <text x="120" y="289" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">15 LLMs</text>

  <rect x="60" y="310" width="120" height="32" rx="6" fill="#e9ecef"/>
  <text x="120" y="331" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">20 Repeats × 3 Var.</text>

  <text x="120" y="370" text-anchor="middle" fill="#868e96" font-size="11" font-weight="600">320,400 API calls</text>

  <!-- Arrow 1 -->
  <path d="M215 240 L240 240" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#adb5bd"/></marker></defs>

  <!-- Center: 3 Experiments -->
  <g>
    <!-- Exp 1 -->
    <rect x="248" y="90" width="195" height="116" rx="10" fill="url(#exp1)" filter="url(#shadow)"/>
    <text x="345" y="116" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 1</text>
    <text x="345" y="140" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Preference Shift</text>
    <text x="345" y="162" text-anchor="middle" fill="#a8c8e8" font-size="10.5">All options clinically appropriate</text>
    <text x="345" y="178" text-anchor="middle" fill="#a8c8e8" font-size="10.5">Does the ad shift the pick?</text>
    <rect x="282" y="188" width="126" height="4" rx="2" fill="#4a90d9" opacity="0.5"/>

    <!-- Exp 2 -->
    <rect x="248" y="218" width="195" height="116" rx="10" fill="url(#exp2)" filter="url(#shadow)"/>
    <text x="345" y="244" text-anchor="middle" fill="#e0d0f0" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 2</text>
    <text x="345" y="268" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Wellness Endorsement</text>
    <text x="345" y="290" text-anchor="middle" fill="#c8b8e8" font-size="10.5">Supplement vs evidence-based advice</text>
    <text x="345" y="306" text-anchor="middle" fill="#c8b8e8" font-size="10.5">Does the ad push toward the product?</text>
    <rect x="282" y="316" width="126" height="4" rx="2" fill="#9b59b6" opacity="0.5"/>

    <!-- Exp 3 -->
    <rect x="248" y="346" width="195" height="96" rx="10" fill="url(#exp3)" filter="url(#shadow)"/>
    <text x="345" y="372" text-anchor="middle" fill="#f8d0d8" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 3</text>
    <text x="345" y="396" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Accuracy Cost</text>
    <text x="345" y="416" text-anchor="middle" fill="#f0b0b8" font-size="10.5">Advertised drug is suboptimal — accuracy lost?</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M448 240 L473 240" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Right: LLM box -->
  <rect x="480" y="120" width="160" height="240" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="148" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">15 LLMs</text>
  <line x1="500" y1="158" x2="620" y2="158" stroke="#dee2e6" stroke-width="1"/>

  <!-- Provider pills -->
  <rect x="500" y="170" width="120" height="24" rx="12" fill="#10a37f" opacity="0.15"/>
  <text x="560" y="186" text-anchor="middle" fill="#10a37f" font-size="10.5" font-weight="600">OpenAI (7)</text>

  <rect x="500" y="204" width="120" height="24" rx="12" fill="#d97706" opacity="0.15"/>
  <text x="560" y="220" text-anchor="middle" fill="#d97706" font-size="10.5" font-weight="600">Anthropic (3)</text>

  <rect x="500" y="238" width="120" height="24" rx="12" fill="#4285f4" opacity="0.15"/>
  <text x="560" y="254" text-anchor="middle" fill="#4285f4" font-size="10.5" font-weight="600">Google (5)</text>

  <!-- Size spectrum -->
  <text x="560" y="290" text-anchor="middle" fill="#868e96" font-size="9.5">nano → small → large → flagship</text>
  <rect x="505" y="300" width="110" height="6" rx="3" fill="#e9ecef"/>
  <rect x="505" y="300" width="110" height="6" rx="3" fill="url(#sizeGrad)"/>
  <defs>
    <linearGradient id="sizeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#adb5bd"/>
      <stop offset="100%" stop-color="#495057"/>
    </linearGradient>
  </defs>

  <text x="560" y="340" text-anchor="middle" fill="#868e96" font-size="9.5" font-style="italic">temp = 0.7, max_tokens = 16</text>

  <!-- Arrow 3 -->
  <path d="M645 240 L670 240" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="678" y="90" width="195" height="300" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="118" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">OUTCOMES</text>
  <line x1="698" y1="128" x2="853" y2="128" stroke="#dee2e6" stroke-width="1"/>

  <!-- Metric boxes -->
  <rect x="698" y="142" width="155" height="52" rx="8" fill="#0f3460" opacity="0.08"/>
  <text x="775" y="162" text-anchor="middle" fill="#0f3460" font-size="11" font-weight="700">Brand Selection Shift</text>
  <text x="775" y="180" text-anchor="middle" fill="#0f3460" font-size="9.5" opacity="0.7">P(advertised|ad) − P(advertised|baseline)</text>

  <rect x="698" y="204" width="155" height="52" rx="8" fill="#533483" opacity="0.08"/>
  <text x="775" y="224" text-anchor="middle" fill="#533483" font-size="11" font-weight="700">Endorsement Rate</text>
  <text x="775" y="242" text-anchor="middle" fill="#533483" font-size="9.5" opacity="0.7">Supplement vs evidence-based</text>

  <rect x="698" y="266" width="155" height="52" rx="8" fill="#e94560" opacity="0.08"/>
  <text x="775" y="286" text-anchor="middle" fill="#e94560" font-size="11" font-weight="700">Accuracy Cost</text>
  <text x="775" y="304" text-anchor="middle" fill="#e94560" font-size="9.5" opacity="0.7">P(correct|baseline) − P(correct|ad)</text>

  <rect x="698" y="330" width="155" height="46" rx="8" fill="#e9ecef"/>
  <text x="775" y="350" text-anchor="middle" fill="#495057" font-size="10" font-weight="600">Cohen's h + Wilson CIs</text>
  <text x="775" y="366" text-anchor="middle" fill="#868e96" font-size="9.5">Per model × prompt × scenario</text>

</svg>
