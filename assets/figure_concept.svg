<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="exp1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="exp2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3d246c"/>
    </linearGradient>
    <linearGradient id="exp3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#adb5bd"/>
    </marker>
    <linearGradient id="sizeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#adb5bd"/>
      <stop offset="100%" stop-color="#495057"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" rx="12" fill="#f8f9fa"/>

  <!-- Header -->
  <rect x="20" y="16" width="920" height="50" rx="8" fill="url(#headerGrad)"/>
  <text x="480" y="48" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700" letter-spacing="0.5">Ad-verse Effects — Experimental Design</text>

  <!-- ===== LEFT: INPUT ===== -->
  <rect x="28" y="84" width="170" height="390" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="113" y="110" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">INPUT</text>
  <line x1="48" y1="120" x2="178" y2="120" stroke="#dee2e6" stroke-width="1"/>

  <rect x="46" y="134" width="134" height="30" rx="6" fill="#e9ecef"/>
  <text x="113" y="154" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">33 Clinical Vignettes</text>

  <rect x="46" y="174" width="134" height="30" rx="6" fill="#e9ecef"/>
  <text x="113" y="194" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">42 Real Ads</text>

  <rect x="46" y="214" width="134" height="30" rx="6" fill="#e9ecef"/>
  <text x="113" y="234" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">4 System Prompts</text>

  <rect x="46" y="254" width="134" height="30" rx="6" fill="#e9ecef"/>
  <text x="113" y="274" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">12 LLMs</text>

  <rect x="46" y="294" width="134" height="30" rx="6" fill="#e9ecef"/>
  <text x="113" y="314" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">20 Repeats x 3 Var.</text>

  <text x="113" y="356" text-anchor="middle" fill="#868e96" font-size="11" font-weight="700">256,320 API calls</text>

  <!-- Arrow: Input → Experiments -->
  <path d="M202 280 L228 280" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- ===== CENTER: 3 EXPERIMENTS ===== -->
  <!-- Experiment 1 -->
  <rect x="236" y="84" width="210" height="120" rx="10" fill="url(#exp1)" filter="url(#shadow)"/>
  <text x="341" y="110" text-anchor="middle" fill="#a8c8e8" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 1</text>
  <text x="341" y="134" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Preference Shift</text>
  <line x1="286" y1="144" x2="396" y2="144" stroke="#4a90d9" stroke-width="2" opacity="0.4"/>
  <text x="341" y="166" text-anchor="middle" fill="#a8c8e8" font-size="10.5">All options clinically appropriate</text>
  <text x="341" y="184" text-anchor="middle" fill="#a8c8e8" font-size="10.5">Does the ad shift the pick?</text>

  <!-- Experiment 2 -->
  <rect x="236" y="218" width="210" height="120" rx="10" fill="url(#exp2)" filter="url(#shadow)"/>
  <text x="341" y="244" text-anchor="middle" fill="#d0c0f0" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 2</text>
  <text x="341" y="268" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Wellness Endorsement</text>
  <line x1="276" y1="278" x2="406" y2="278" stroke="#9b59b6" stroke-width="2" opacity="0.4"/>
  <text x="341" y="300" text-anchor="middle" fill="#c8b8e8" font-size="10.5">Supplement vs evidence-based advice</text>
  <text x="341" y="318" text-anchor="middle" fill="#c8b8e8" font-size="10.5">Does the ad push toward the product?</text>

  <!-- Experiment 3 -->
  <rect x="236" y="352" width="210" height="120" rx="10" fill="url(#exp3)" filter="url(#shadow)"/>
  <text x="341" y="378" text-anchor="middle" fill="#f8d0d8" font-size="10" font-weight="600" letter-spacing="1">EXPERIMENT 3</text>
  <text x="341" y="402" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Accuracy Cost</text>
  <line x1="286" y1="412" x2="396" y2="412" stroke="#ff8a8a" stroke-width="2" opacity="0.4"/>
  <text x="341" y="434" text-anchor="middle" fill="#f0b0b8" font-size="10.5">Advertised drug is suboptimal</text>
  <text x="341" y="452" text-anchor="middle" fill="#f0b0b8" font-size="10.5">Does the model sacrifice accuracy?</text>

  <!-- Arrow: Experiments → LLMs -->
  <path d="M450 280 L476 280" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- ===== CENTER-RIGHT: LLMs ===== -->
  <rect x="484" y="130" width="170" height="260" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="569" y="158" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">12 LLMs</text>
  <line x1="504" y1="168" x2="634" y2="168" stroke="#dee2e6" stroke-width="1"/>

  <!-- Provider pills -->
  <rect x="509" y="182" width="120" height="26" rx="13" fill="#10a37f" opacity="0.12"/>
  <text x="569" y="200" text-anchor="middle" fill="#10a37f" font-size="11" font-weight="600">OpenAI (7)</text>

  <rect x="509" y="218" width="120" height="26" rx="13" fill="#d97706" opacity="0.12"/>
  <text x="569" y="236" text-anchor="middle" fill="#d97706" font-size="11" font-weight="600">Anthropic (3)</text>

  <rect x="509" y="254" width="120" height="26" rx="13" fill="#4285f4" opacity="0.12"/>
  <text x="569" y="272" text-anchor="middle" fill="#4285f4" font-size="11" font-weight="600">Google (5)</text>

  <!-- Size spectrum -->
  <text x="569" y="308" text-anchor="middle" fill="#868e96" font-size="9.5">nano → small → large → flagship</text>
  <rect x="514" y="318" width="110" height="5" rx="2.5" fill="url(#sizeGrad)"/>

  <text x="569" y="358" text-anchor="middle" fill="#868e96" font-size="9.5" font-style="italic">temp = 0.7, max_tokens = 16</text>

  <!-- Arrow: LLMs → Outcomes -->
  <path d="M658 280 L684 280" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- ===== RIGHT: OUTCOMES ===== -->
  <rect x="692" y="84" width="240" height="390" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="812" y="112" text-anchor="middle" fill="#495057" font-size="13" font-weight="700">OUTCOMES</text>
  <line x1="712" y1="122" x2="912" y2="122" stroke="#dee2e6" stroke-width="1"/>

  <!-- Metric 1 -->
  <rect x="712" y="136" width="200" height="66" rx="8" fill="#0f3460" opacity="0.07"/>
  <text x="812" y="160" text-anchor="middle" fill="#0f3460" font-size="12" font-weight="700">Brand Selection Shift</text>
  <text x="812" y="180" text-anchor="middle" fill="#0f3460" font-size="9.5" opacity="0.65">P(advertised | ad) - P(advertised | baseline)</text>
  <text x="812" y="194" text-anchor="middle" fill="#0f3460" font-size="9" opacity="0.5">13 Rx scenarios · 4 options each</text>

  <!-- Metric 2 -->
  <rect x="712" y="214" width="200" height="66" rx="8" fill="#533483" opacity="0.07"/>
  <text x="812" y="238" text-anchor="middle" fill="#533483" font-size="12" font-weight="700">Endorsement Rate</text>
  <text x="812" y="258" text-anchor="middle" fill="#533483" font-size="9.5" opacity="0.65">Supplement vs evidence-based advice</text>
  <text x="812" y="272" text-anchor="middle" fill="#533483" font-size="9" opacity="0.5">10 wellness scenarios · 2 options</text>

  <!-- Metric 3 -->
  <rect x="712" y="292" width="200" height="66" rx="8" fill="#e94560" opacity="0.07"/>
  <text x="812" y="316" text-anchor="middle" fill="#e94560" font-size="12" font-weight="700">Accuracy Cost</text>
  <text x="812" y="336" text-anchor="middle" fill="#e94560" font-size="9.5" opacity="0.65">P(correct | baseline) - P(correct | ad)</text>
  <text x="812" y="350" text-anchor="middle" fill="#e94560" font-size="9" opacity="0.5">10 augmentation scenarios · 3 options</text>

  <!-- Stats -->
  <rect x="712" y="372" width="200" height="54" rx="8" fill="#e9ecef"/>
  <text x="812" y="394" text-anchor="middle" fill="#495057" font-size="11" font-weight="600">Cohen's h + Wilson CIs</text>
  <text x="812" y="412" text-anchor="middle" fill="#868e96" font-size="9.5">Per model x prompt x scenario</text>

  <!-- Bottom border line -->
  <rect x="20" y="488" width="920" height="3" rx="1.5" fill="#1a1a2e" opacity="0.08"/>

</svg>
